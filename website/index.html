<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/manifest.json">
  <title>Malec Systems</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    .wordmark {
      font-size: 10px;
      letter-spacing: 5px;
      color: #ffffff;
      text-transform: uppercase;
      font-weight: 600;
    }

    #reset-btn {
      font-size: 9px;
      letter-spacing: 2px;
      color: #555555;
      text-transform: uppercase;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 4px 0;
    }
    #reset-btn:active { color: #ffffff; }
    #dashboard-link {
      font-size: 9px;
      letter-spacing: 2px;
      color: #555555;
      text-transform: uppercase;
      text-decoration: none;
      font-family: inherit;
      font-weight: 400;
    }
    #dashboard-link:hover { color: #ffffff; }
    .header-right { display: flex; align-items: center; gap: 20px; }

    #messages {
      position: fixed;
      top: 52px;
      bottom: 72px;
      left: 0; right: 0;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #000000;
      color: #ffffff;
      border-radius: 2px;
    }

    .msg.claude {
      align-self: flex-start;
      background: #ffffff;
      color: #000000;
      border-radius: 2px;
      border: 1px solid #e8e8e8;
    }

    .msg.loading {
      align-self: flex-start;
      background: #ffffff;
      color: #aaaaaa;
      border: 1px solid #e8e8e8;
      border-radius: 2px;
      font-size: 13px;
      letter-spacing: 2px;
    }

    #input-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      background: #ffffff;
      border-top: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
    }

    #input {
      flex: 1;
      border: none;
      border-bottom: 1.5px solid #000000;
      padding: 8px 0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      background: transparent;
      color: #000000;
      border-radius: 0;
    }
    #input::placeholder { color: #cccccc; }

    #send-btn {
      background: #000000;
      color: #ffffff;
      border: none;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 0;
    }
    #send-btn:active { background: #333333; }
    #send-btn svg { width: 14px; height: 14px; fill: #ffffff; }
    #send-btn:disabled { background: #cccccc; }
  </style>
</head>
<body>
  <div id="header">
    <span class="wordmark">Malec Systems</span>
    <div class="header-right"><a href="https://dashboard.malecsystems.com/" target="_blank" id="dashboard-link">Dashboard</a><button id="reset-btn">New thread</button></div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="input" type="text" placeholder="Message" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false">
    <button id="send-btn" id="send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const resetBtn = document.getElementById('reset-btn');
    let loading = false;
    let resetNext = false;

    function scrollDown() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollDown();
      return div;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || loading) return;
      loading = true;
      sendBtn.disabled = true;
      inputEl.value = '';

      addMessage(text, 'user');
      const loadingEl = addMessage('thinking...', 'loading');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, reset: resetNext })
        });
        resetNext = false;
        const data = await res.json();
        loadingEl.remove();
        if (data.error) {
          addMessage('Error: ' + data.error, 'claude');
        } else {
          addMessage(data.response, 'claude');
        }
      } catch (e) {
        loadingEl.remove();
        addMessage('Connection error.', 'claude');
      }

      loading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    resetBtn.addEventListener('click', () => {
      fetch('/reset', { method: 'POST' });
      messagesEl.innerHTML = '';
      resetNext = true;
    });
  </script>
</body>
</html>
